name: assets-api
region: nyc

services:
  - name: api
    github:
      repo: McGuireTechnology/Assets
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: DATABASE_URL
        value: ${assets-db.DATABASE_PRIVATE_URL}
        scope: RUN_TIME
        type: SECRET
      - key: ASSETS_CORS_ORIGINS
        value: https://assets.pages.dev
        scope: RUN_TIME
      - key: ASSETS_SKIP_DB_INIT
        value: "false"
        scope: RUN_TIME
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    alerts:
      - rule: DEPLOYMENT_FAILED

databases:
  - name: assets-db
    engine: PG
    version: "18"
    production: false
    db_name: assets
    db_user: assets
