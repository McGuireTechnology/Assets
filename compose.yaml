services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: assets
      POSTGRES_USER: assets
      POSTGRES_PASSWORD: assets
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assets -d assets"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://assets:assets@postgres:5432/assets
      ASSETS_CORS_ORIGINS: http://localhost:15173,http://127.0.0.1:15173
      ASSETS_SKIP_DB_INIT: "false"
      ASSETS_VERSION: local
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:18000
    depends_on:
      - backend
    ports:
      - "15173:5173"

  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      - "15174:5174"

volumes:
  postgres-data:
